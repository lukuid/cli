name: CLI Launchpad

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ppa_revision:
        description: "Launchpad PPA revision suffix"
        required: false
        default: "1"

concurrency:
  group: cli-launchpad-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      ppa_revision: ${{ steps.meta.outputs.ppa_revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          git fetch origin main --depth=1
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            [[ "${GITHUB_REF_NAME#v}" == "$VERSION" ]]
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ppa_revision=${{ github.event.inputs.ppa_revision || '1' }}" >> "$GITHUB_OUTPUT"
      - run: python3 scripts/version_sync.py check

  upload:
    runs-on: ubuntu-latest
    needs: meta
    if: vars.LAUNCHPAD_PPA != ''
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: noble
            series_version: "24.04"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Launchpad packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput gnupg
      - run: python3 scripts/version_sync.py check
      - id: gpg
        name: Import Launchpad signing key
        env:
          LAUNCHPAD_GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$LAUNCHPAD_GPG_PRIVATE_KEY"
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$LAUNCHPAD_GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          test -n "$KEY_ID"
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
      - name: Render Launchpad source tree
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/render_launchpad_source.py \
            --version "${{ needs.meta.outputs.version }}" \
            --suite "${{ matrix.suite }}" \
            --series-version "${{ matrix.series_version }}" \
            --output-dir "$RUNNER_TEMP/launchpad/${{ matrix.suite }}" \
            --ppa-revision "${{ needs.meta.outputs.ppa_revision }}"
      - name: Build signed source package
        shell: bash
        env:
          DEBFULLNAME: LukuID
          DEBEMAIL: hello@lukuid.com
          LAUNCHPAD_GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          SOURCE_DIR="$RUNNER_TEMP/launchpad/${{ matrix.suite }}/lukuid-cli-${{ needs.meta.outputs.version }}"
          cd "$SOURCE_DIR"
          debuild -S -sa -us -uc
          CHANGES_FILE="$(find .. -maxdepth 1 -name '*.changes' | head -n1)"
          if [[ -n "${LAUNCHPAD_GPG_PASSPHRASE:-}" ]]; then
            debsign \
              -k"${{ steps.gpg.outputs.key_id }}" \
              -p"gpg --batch --no-tty --pinentry-mode loopback --passphrase ${LAUNCHPAD_GPG_PASSPHRASE}" \
              "$CHANGES_FILE"
          else
            debsign -k"${{ steps.gpg.outputs.key_id }}" "$CHANGES_FILE"
          fi
      - name: Upload source package artifact
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-${{ matrix.suite }}
          path: |
            ${{ runner.temp }}/launchpad/${{ matrix.suite }}/*.changes
            ${{ runner.temp }}/launchpad/${{ matrix.suite }}/*.dsc
            ${{ runner.temp }}/launchpad/${{ matrix.suite }}/*.debian.tar.xz
            ${{ runner.temp }}/launchpad/${{ matrix.suite }}/*.orig.tar.gz
            ${{ runner.temp }}/launchpad/${{ matrix.suite }}/*.buildinfo
      - name: Upload source package to Launchpad
        shell: bash
        run: |
          set -euo pipefail
          dput "ppa:${{ vars.LAUNCHPAD_PPA }}" "$RUNNER_TEMP/launchpad/${{ matrix.suite }}/"*.changes
      - name: Upload source package to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "CLI release $TAG"
          gh release upload "$TAG" \
            "$RUNNER_TEMP/launchpad/${{ matrix.suite }}/"*.changes \
            "$RUNNER_TEMP/launchpad/${{ matrix.suite }}/"*.dsc \
            "$RUNNER_TEMP/launchpad/${{ matrix.suite }}/"*.debian.tar.xz \
            "$RUNNER_TEMP/launchpad/${{ matrix.suite }}/"*.orig.tar.gz \
            --clobber
